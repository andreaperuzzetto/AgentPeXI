# AgentPeXI -- Servizi di sviluppo locale
# Avviare con: docker-compose up -d
# Non usare in produzione (no TLS, credenziali di default).

services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentpexi
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: agentpexi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpexi -d agentpexi"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Crea il bucket agentpexi al primo avvio (one-shot, non si riavvia)
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/agentpexi;
      mc anonymous set none local/agentpexi;
      exit 0;
      "
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
