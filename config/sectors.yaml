# Settori di business target
#
# Usato da:
#   - Scout Agent: valida che il settore richiesto sia in lista
#   - Market Analyst Agent: contestualizza lo scoring e i gap signals
#   - Template email: popola {{sector_label}}
#
# Struttura:
#   key:    identificatore snake_case (usato in DB e payload)
#   label:  nome italiano leggibile (usato in email e proposte)
